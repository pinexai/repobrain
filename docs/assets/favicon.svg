<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="repobrain icon">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Left lobe -->
  <path d="M 16,6 C 13,5 9,6 7,9 C 4,12 3,17 5,21 C 7,25 11,27 14.5,27.5 C 15.2,27.6 15.7,27.5 16,27"
        fill="none" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right lobe -->
  <path d="M 16,6 C 19,5 23,6 25,9 C 28,12 29,17 27,21 C 25,25 21,27 17.5,27.5 C 16.8,27.6 16.3,27.5 16,27"
        fill="none" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Brain stem -->
  <path d="M 14.5,27 L 14,30 Q 16,31 18,30 L 17.5,27"
        fill="none" stroke="url(#g)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Neural nodes -->
  <circle cx="10" cy="13" r="1.5" fill="#818cf8"/>
  <circle cx="16" cy="10" r="1.5" fill="url(#g)"/>
  <circle cx="22" cy="13" r="1.5" fill="#22d3ee"/>
  <circle cx="8" cy="19" r="1.3" fill="#818cf8"/>
  <circle cx="16" cy="18" r="2" fill="url(#g)"/>
  <circle cx="24" cy="19" r="1.3" fill="#22d3ee"/>
  <!-- Connections -->
  <line x1="10" y1="13" x2="16" y2="10" stroke="url(#g)" stroke-width="0.8" opacity="0.6"/>
  <line x1="16" y1="10" x2="22" y2="13" stroke="url(#g)" stroke-width="0.8" opacity="0.6"/>
  <line x1="10" y1="13" x2="16" y2="18" stroke="url(#g)" stroke-width="0.8" opacity="0.6"/>
  <line x1="22" y1="13" x2="16" y2="18" stroke="url(#g)" stroke-width="0.8" opacity="0.6"/>
  <line x1="8" y1="19" x2="16" y2="18" stroke="url(#g)" stroke-width="0.8" opacity="0.6"/>
  <line x1="24" y1="19" x2="16" y2="18" stroke="url(#g)" stroke-width="0.8" opacity="0.6"/>
</svg>
