<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="repobrain logo">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left brain lobe -->
  <path d="M 100,38 C 90,34 70,36 55,48 C 38,62 30,84 34,106 C 38,126 52,140 70,146 C 82,150 93,148 100,145"
        fill="none" stroke="url(#brainGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right brain lobe -->
  <path d="M 100,38 C 110,34 130,36 145,48 C 162,62 170,84 166,106 C 162,126 148,140 130,146 C 118,150 107,148 100,145"
        fill="none" stroke="url(#brainGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brain stem -->
  <path d="M 93,145 L 90,162 Q 100,168 110,162 L 107,145"
        fill="none" stroke="url(#brainGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left gyri (sulci folds) -->
  <path d="M 38,84 Q 50,72 60,78 Q 70,84 78,72"
        fill="none" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 36,110 Q 50,100 62,106 Q 74,112 82,100"
        fill="none" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Right gyri (sulci folds) -->
  <path d="M 122,72 Q 130,84 140,78 Q 150,72 162,84"
        fill="none" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 118,100 Q 126,112 138,106 Q 150,100 164,110"
        fill="none" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Neural connections (draw before nodes so nodes appear on top) -->
  <line x1="68" y1="72" x2="100" y2="58" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="100" y1="58" x2="132" y2="72" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="68" y1="72" x2="52" y2="104" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="68" y1="72" x2="100" y2="100" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="132" y1="72" x2="148" y2="104" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="132" y1="72" x2="100" y2="100" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="52" y1="104" x2="100" y2="100" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="148" y1="104" x2="100" y2="100" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="52" y1="104" x2="78" y2="130" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="148" y1="104" x2="122" y2="130" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="100" y1="100" x2="78" y2="130" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="100" y1="100" x2="122" y2="130" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>
  <line x1="78" y1="130" x2="122" y2="130" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.55"/>

  <!-- Neural network nodes -->
  <circle cx="68" cy="72" r="5.5" fill="#818cf8" filter="url(#softGlow)"/>
  <circle cx="100" cy="58" r="5.5" fill="url(#brainGrad)" filter="url(#softGlow)"/>
  <circle cx="132" cy="72" r="5.5" fill="#22d3ee" filter="url(#softGlow)"/>
  <circle cx="52" cy="104" r="5" fill="#818cf8" filter="url(#softGlow)"/>
  <circle cx="100" cy="100" r="7.5" fill="url(#brainGrad)" filter="url(#glow)"/>
  <circle cx="148" cy="104" r="5" fill="#22d3ee" filter="url(#softGlow)"/>
  <circle cx="78" cy="130" r="4.5" fill="#818cf8" filter="url(#softGlow)"/>
  <circle cx="122" cy="130" r="4.5" fill="#22d3ee" filter="url(#softGlow)"/>
</svg>
