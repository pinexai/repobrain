site_name: repobrain
site_description: Codebase intelligence that thinks ahead — outperforms repowise on every dimension
site_url: https://pinexai.github.io/repobrain
repo_url: https://github.com/pinexai/repobrain
repo_name: pinexai/repobrain

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/asciinema-player.min.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - CLI Reference:
    - Overview: cli/index.md
    - repobrain index: cli/index-cmd.md
    - repobrain review: cli/review.md
    - repobrain serve: cli/serve.md
    - repobrain costs: cli/costs.md
  - MCP Tools:
    - Overview: mcp/overview.md
    - get_pr_impact: mcp/pr-impact.md
    - get_knowledge_map: mcp/knowledge-map.md
    - get_test_gaps: mcp/test-gaps.md
    - get_security_hotspots: mcp/security-hotspots.md
  - Architecture:
    - Indexing Pipeline: architecture/pipeline.md
    - Atomic Transactions: architecture/coordinator.md
    - Temporal Scoring: architecture/temporal.md
  - Deployment:
    - Docker: deployment/docker.md
    - Production: deployment/production.md
  - Reference:
    - Python API: reference/api.md
    - Migration from repowise: reference/migration.md
    - Contributing: reference/contributing.md
    - Changelog: reference/changelog.md
  - Support:
    - Troubleshooting: support/troubleshooting.md
    - FAQ: support/faq.md
  - vs. repowise: comparison.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pinexai/repobrain
      name: repobrain on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/repobrain/
      name: repobrain on PyPI
  version:
    provider: mike
